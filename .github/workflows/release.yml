name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify tag matches project version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Compare tag to CMakeLists.txt / vcpkg.json
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cmake_version=$(grep -oP '(?<=VERSION )[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | head -1)
          vcpkg_version=$(grep -oP '(?<="version": ")[^"]+' vcpkg.json)
          if [ "$tag_version" != "$cmake_version" ] || [ "$tag_version" != "$vcpkg_version" ]; then
            echo "Version mismatch: tag=$tag_version CMakeLists.txt=$cmake_version vcpkg.json=$vcpkg_version"
            exit 1
          fi

  build-test:
    name: Build & test (gcc-14 release)
    needs: verify-version
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-14 g++-14

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-release-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-release-

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake --preset ci-release

      - name: Build
        run: cmake --build --preset ci-release

      - name: Test
        run: ctest --preset ci-release

  publish:
    name: Publish GitHub release
    needs: build-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
