name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.compiler }} ${{ matrix.config }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        config: [debug, release]
        include:
          - compiler: gcc
            cc: gcc-14
            cxx: g++-14
            packages: gcc-14 g++-14
          - compiler: clang
            cc: clang-18
            cxx: clang++-18
            packages: clang-18
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.packages }}

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ matrix.compiler }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.compiler }}-

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset ci-${{ matrix.config }}

      - name: Build
        run: cmake --build --preset ci-${{ matrix.config }}

      - name: Test
        run: ctest --preset ci-${{ matrix.config }}
